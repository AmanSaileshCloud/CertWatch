# CERTWatch — single-server Nginx site.
# Serves the built React SPA and reverse-proxies the API to uvicorn on :8000.
# Same origin → no CORS. HTTP only for now; see DEPLOY.md to add HTTPS later.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /opt/certwatch/app/frontend/dist;
    index index.html;

    # Modest upload cap; the bulk-import payload is tiny.
    client_max_body_size 1m;

    # API routes → uvicorn. These are the only prefixes the backend owns.
    location ~ ^/(auth|admin|domains|checks|health)(/|$) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Hashed static assets — safe to cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: any other path returns index.html so client routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
